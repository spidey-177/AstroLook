<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta name="theme-color" content="#0a0a1a" />
    <title>AstroLook ✦ AI Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              space: {
                950: "#04040f",
                900: "#0a0a1a",
                800: "#0f0f2a",
                700: "#141435",
                600: "#1a1a4a",
              },
              neon: {
                blue: "#4f8ef7",
                blueDark: "#2563eb",
                purple: "#a855f7",
                purpleDark: "#7c3aed",
                pink: "#e879f9",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
            animation: {
              "spin-slow": "spin 2s linear infinite",
              "pulse-glow": "pulseGlow 2s ease-in-out infinite",
              float: "float 3s ease-in-out infinite",
              "fade-in": "fadeIn 0.4s ease-out forwards",
              "card-in": "cardIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards",
              shimmer: "shimmer 1.5s infinite",
              "pop-in": "popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards",
              "slide-up": "slideUp 0.5s ease-out forwards",
            },
            keyframes: {
              pulseGlow: {
                "0%,100%": {
                  boxShadow:
                    "0 0 20px rgba(79,142,247,0.4),0 0 40px rgba(168,85,247,0.2)",
                },
                "50%": {
                  boxShadow:
                    "0 0 40px rgba(79,142,247,0.8),0 0 80px rgba(168,85,247,0.5)",
                },
              },
              float: {
                "0%,100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
              },
              fadeIn: { from: { opacity: "0" }, to: { opacity: "1" } },
              slideUp: {
                from: { opacity: "0", transform: "translateY(30px)" },
                to: { opacity: "1", transform: "translateY(0)" },
              },
              cardIn: {
                from: {
                  opacity: "0",
                  transform: "translateY(40px) scale(0.95)",
                },
                to: { opacity: "1", transform: "translateY(0) scale(1)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-200% center" },
                "100%": { backgroundPosition: "200% center" },
              },
              popIn: {
                from: { opacity: "0", transform: "scale(0.82)" },
                to: { opacity: "1", transform: "scale(1)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        background: #04040f;
        overflow-x: hidden;
      }

      /* ── Stars ── */
      .stars-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle var(--duration, 3s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.1;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.5);
        }
      }

      /* ── Mesh ── */
      .mesh-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 60% 40% at 20% 20%,
            rgba(79, 142, 247, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 50% at 80% 80%,
            rgba(168, 85, 247, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 40% 60% at 50% 50%,
            rgba(232, 121, 249, 0.04) 0%,
            transparent 70%
          );
      }

      /* ── Glow buttons ── */
      .btn-glow {
        background: linear-gradient(135deg, #4f8ef7, #a855f7);
        box-shadow:
          0 0 30px rgba(79, 142, 247, 0.5),
          0 0 60px rgba(168, 85, 247, 0.3);
        transition: all 0.3s ease;
      }
      .btn-glow:active {
        transform: scale(0.97);
      }
      .btn-glow-blue {
        background: linear-gradient(135deg, #4f8ef7, #2563eb);
        box-shadow:
          0 0 22px rgba(79, 142, 247, 0.6),
          0 0 44px rgba(79, 142, 247, 0.2);
        transition: all 0.25s ease;
      }
      .btn-glow-blue:active {
        transform: scale(0.96);
      }
      .btn-glow-purple {
        background: linear-gradient(135deg, #a855f7, #7c3aed);
        box-shadow:
          0 0 22px rgba(168, 85, 247, 0.6),
          0 0 44px rgba(168, 85, 247, 0.2);
        transition: all 0.25s ease;
      }
      .btn-glow-purple:active {
        transform: scale(0.96);
      }

      /* ── Card border ── */
      .card-border {
        position: relative;
        background: linear-gradient(145deg, #0f0f2a, #141435);
        border: 1px solid transparent;
        background-clip: padding-box;
      }
      .card-border::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        z-index: -1;
        background: linear-gradient(
          135deg,
          rgba(79, 142, 247, 0.4),
          rgba(168, 85, 247, 0.4),
          rgba(232, 121, 249, 0.2)
        );
      }

      /* ── Spinner ── */
      .spinner-ring {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 3px solid rgba(79, 142, 247, 0.15);
        border-top-color: #4f8ef7;
        border-right-color: #a855f7;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Shimmer text ── */
      .shimmer-text {
        background: linear-gradient(
          90deg,
          #4f8ef7 0%,
          #e879f9 25%,
          #a855f7 50%,
          #4f8ef7 75%,
          #e879f9 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }
      .neon-text {
        text-shadow:
          0 0 10px rgba(79, 142, 247, 0.8),
          0 0 20px rgba(168, 85, 247, 0.5);
      }
      .tag-gradient {
        background: linear-gradient(
          135deg,
          rgba(79, 142, 247, 0.15),
          rgba(168, 85, 247, 0.15)
        );
        border: 1px solid rgba(79, 142, 247, 0.3);
      }

      html {
        scroll-behavior: smooth;
      }
      .progress-fill {
        animation: progressFill 3s linear forwards;
      }
      @keyframes progressFill {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }

      .card-delay-1 {
        animation-delay: 0.1s;
        opacity: 0;
      }
      .card-delay-2 {
        animation-delay: 0.25s;
        opacity: 0;
      }
      .card-delay-3 {
        animation-delay: 0.4s;
        opacity: 0;
      }

      /* ── Armario ── */
      .armario-img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        display: block;
      }

      /* ── Premium badge ── */
      .btn-premium {
        background: linear-gradient(
          135deg,
          rgba(168, 85, 247, 0.2),
          rgba(232, 121, 249, 0.1)
        );
        border: 1px solid rgba(168, 85, 247, 0.5);
        transition: all 0.25s ease;
      }
      .btn-premium:active {
        transform: scale(0.93);
      }

      /* ── Limit banner ── */
      .limit-banner {
        background: linear-gradient(
          135deg,
          rgba(232, 121, 249, 0.1),
          rgba(168, 85, 247, 0.08)
        );
        border: 1px solid rgba(232, 121, 249, 0.4);
        animation: pulseGlow 2.5s ease-in-out infinite;
      }

      /* ── Premium card glow ── */
      .premium-card-glow {
        box-shadow:
          0 0 0 1px rgba(168, 85, 247, 0.5),
          0 0 35px rgba(168, 85, 247, 0.3),
          0 0 70px rgba(79, 142, 247, 0.12);
      }

      /* ── Armario progress ── */
      .armario-bar-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef, useEffect, useCallback, useMemo } = React;

      /* ══════════════════════════════════════════════════
     CONSTANTE DE LÍMITE GRATUITO
  ══════════════════════════════════════════════════ */
      const FREE_LIMIT = 3;

      /* ══════════════════════════════════════════════════
     ICONS
  ══════════════════════════════════════════════════ */
      const Icon = ({
        d,
        size = 24,
        stroke = "currentColor",
        fill = "none",
        strokeWidth = 2,
        className = "",
      }) => (
        <svg
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill={fill}
          stroke={stroke}
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {Array.isArray(d) ? (
            d.map((p, i) => <path key={i} d={p} />)
          ) : (
            <path d={d} />
          )}
        </svg>
      );

      const GalleryIconSVG = ({ size = 24, className = "" }) => (
        <svg
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <rect x="3" y="3" width="18" height="18" rx="3" ry="3" />
          <path d="M3 15l5-5 4 4 3-3 6 6" />
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none" />
        </svg>
      );

      const Icons = {
        Camera: (p) => (
          <Icon
            {...p}
            d={[
              "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z",
              "M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
            ]}
          />
        ),
        Gallery: (p) => <GalleryIconSVG {...p} />,
        Sparkles: (p) => (
          <Icon
            {...p}
            d={[
              "M12 3l1.09 3.34L16.5 7.5l-3.41 1.16L12 12l-1.09-3.34L7.5 7.5l3.41-1.16L12 3z",
              "M5 17l.55 1.7L7.25 19.5l-1.7.55L5 21.75l-.55-1.7L2.75 19.5l1.7-.55L5 17z",
              "M19 3l.55 1.7L21.25 5.5l-1.7.55L19 7.75l-.55-1.7L16.75 5.5l1.7-.55L19 3z",
            ]}
          />
        ),
        Sneaker: (p) => (
          <Icon
            {...p}
            d="M4 16l1-4h14l1 4H4zM3 16h18v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2zM8 12V9m4 3V8m4 4v-3"
          />
        ),
        Briefcase: (p) => (
          <Icon
            {...p}
            d={[
              "M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z",
              "M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2",
            ]}
          />
        ),
        Moon: (p) => (
          <Icon {...p} d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        ),
        ArrowLeft: (p) => <Icon {...p} d="M19 12H5M5 12l7 7M5 12l7-7" />,
        Star: (p) => (
          <Icon
            {...p}
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
            fill="currentColor"
            stroke="none"
          />
        ),
        Shirt: (p) => (
          <Icon
            {...p}
            d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"
          />
        ),
        ChevronRight: (p) => <Icon {...p} d="M9 18l6-6-6-6" />,
        Refresh: (p) => (
          <Icon
            {...p}
            d={[
              "M1 4v6h6",
              "M23 20v-6h-6",
              "M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15",
            ]}
          />
        ),
        Trash: (p) => (
          <Icon
            {...p}
            d={[
              "M3 6h18",
              "M19 6l-1 14H6L5 6",
              "M9 6V4h6v2",
              "M10 11v6",
              "M14 11v6",
            ]}
          />
        ),
        Close: (p) => <Icon {...p} d="M18 6L6 18M6 6l12 12" />,
        Crown: (p) => (
          <Icon {...p} d={["M2 19h20", "M3 19l2-7 5 4 2-5 2 5 5-4 2 7"]} />
        ),
        Check: (p) => <Icon {...p} d="M20 6L9 17l-5-5" />,
        Zap: (p) => (
          <Icon
            {...p}
            d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"
            fill="currentColor"
            stroke="none"
          />
        ),
        Lock: (p) => (
          <Icon
            {...p}
            d={[
              "M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z",
              "M7 11V7a5 5 0 0 1 10 0v4",
            ]}
          />
        ),
        Rocket: (p) => (
          <Icon
            {...p}
            d={[
              "M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z",
              "M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z",
            ]}
          />
        ),
        Scan: (p) => (
          <Icon
            {...p}
            d={[
              "M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2",
              "M8 12h8M12 8v8",
            ]}
          />
        ),
      };

      /* ══════════════════════════════════════════════════
     LOCALSTORAGE
  ══════════════════════════════════════════════════ */
      const STORAGE_KEY = "astroArmario";
      const loadArmario = () => {
        try {
          const r = localStorage.getItem(STORAGE_KEY);
          return r ? JSON.parse(r) : [];
        } catch {
          return [];
        }
      };
      const saveToArmario = (b64) => {
        try {
          const a = loadArmario();
          a.unshift({
            id: Date.now(),
            src: b64,
            date: new Date().toLocaleDateString("es-ES"),
          });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(a));
        } catch (e) {
          console.warn(e);
        }
      };
      const deleteFromArmario = (id) => {
        try {
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify(loadArmario().filter((x) => x.id !== id)),
          );
        } catch {}
      };

      /* ══════════════════════════════════════════════════
     STARS
  ══════════════════════════════════════════════════ */
      const StarsBackground = () => {
        const stars = useMemo(
          () =>
            Array.from({ length: 60 }, (_, i) => ({
              id: i,
              top: `${Math.random() * 100}%`,
              left: `${Math.random() * 100}%`,
              duration: `${2 + Math.random() * 4}s`,
              delay: `${Math.random() * 4}s`,
              size: Math.random() > 0.8 ? 3 : 2,
              opacity: 0.3 + Math.random() * 0.7,
            })),
          [],
        );
        return (
          <div className="stars-bg">
            {stars.map((s) => (
              <div
                key={s.id}
                className="star"
                style={{
                  top: s.top,
                  left: s.left,
                  width: s.size,
                  height: s.size,
                  "--duration": s.duration,
                  "--delay": s.delay,
                  opacity: s.opacity,
                }}
              />
            ))}
          </div>
        );
      };

      /* ══════════════════════════════════════════════════
     HEADER  — muestra btn Premium en home
  ══════════════════════════════════════════════════ */
      const Header = ({ onBack, showBack, onGoPremium }) => (
        <header className="relative z-10 flex items-center justify-between px-5 py-4 border-b border-white/5">
          {showBack ? (
            <button
              onClick={onBack}
              className="flex items-center gap-1.5 text-sm text-white/50 hover:text-white transition-colors active:scale-95"
            >
              <Icons.ArrowLeft size={16} />
              <span>Inicio</span>
            </button>
          ) : (
            <div className="w-20" />
          )}

          <div className="flex items-center gap-2">
            <div
              className="w-7 h-7 rounded-lg flex items-center justify-center"
              style={{ background: "linear-gradient(135deg,#4f8ef7,#a855f7)" }}
            >
              <Icons.Star size={14} className="text-white" />
            </div>
            <span
              className="font-display text-lg tracking-tight text-white neon-text"
              style={{ fontWeight: 700 }}
            >
              AstroLook
            </span>
          </div>

          <div className="w-20 flex justify-end">
            {!showBack && onGoPremium ? (
              <button
                onClick={onGoPremium}
                className="btn-premium rounded-full px-2.5 py-1 flex items-center gap-1.5"
              >
                <Icons.Crown size={11} className="text-purple-300" />
                <span className="text-xs font-bold text-purple-200">
                  Premium
                </span>
              </button>
            ) : (
              <div className="tag-gradient rounded-full px-2 py-0.5 text-xs text-blue-300 font-medium">
                AI ✦
              </div>
            )}
          </div>
        </header>
      );

      /* ══════════════════════════════════════════════════
     OUTFIT DATA
  ══════════════════════════════════════════════════ */
      const outfits = [
        {
          id: 1,
          title: "Look Casual",
          tag: "Everyday",
          icon: "Sneaker",
          description:
            "Combina ideal con unos jeans rectos oscuros y zapatillas blancas clásicas. Un conjunto fresco y versátil para el día a día.",
          color: { from: "#4f8ef7", to: "#38bdf8" },
          glow: "rgba(79,142,247,0.35)",
          accent: "text-blue-400",
          border: "rgba(79,142,247,0.3)",
          tagBg: "rgba(79,142,247,0.12)",
          tagColor: "#93c5fd",
          items: [
            "Jeans rectos oscuros",
            "Zapatillas blancas",
            "Cinturón negro",
          ],
        },
        {
          id: 2,
          title: "Look Formal",
          tag: "Professional",
          icon: "Briefcase",
          description:
            "Dale un toque elegante con un pantalón chino beige y botines de cuero marrón. Sofisticación con clase.",
          color: { from: "#a855f7", to: "#c084fc" },
          glow: "rgba(168,85,247,0.35)",
          accent: "text-purple-400",
          border: "rgba(168,85,247,0.3)",
          tagBg: "rgba(168,85,247,0.12)",
          tagColor: "#c4b5fd",
          items: ["Pantalón chino beige", "Botines marrón", "Reloj clásico"],
        },
        {
          id: 3,
          title: "Look Noche",
          tag: "Night Out",
          icon: "Moon",
          description:
            "Atrévete con un pantalón negro ajustado y una chaqueta de cuero sintético. Estilo oscuro y magnético.",
          color: { from: "#e879f9", to: "#a855f7" },
          glow: "rgba(232,121,249,0.35)",
          accent: "text-pink-400",
          border: "rgba(232,121,249,0.3)",
          tagBg: "rgba(232,121,249,0.12)",
          tagColor: "#f0abfc",
          items: [
            "Pantalón negro ajustado",
            "Chaqueta cuero sintético",
            "Chelsea boots",
          ],
        },
      ];

      /* ══════════════════════════════════════════════════
     OUTFIT CARD
  ══════════════════════════════════════════════════ */
      const OutfitCard = ({ outfit, index }) => {
        const [pressed, setPressed] = useState(false);
        const IC = Icons[outfit.icon] || Icons.Shirt;
        const delay =
          ["card-delay-1", "card-delay-2", "card-delay-3"][index] || "";
        return (
          <div
            className={`card-border rounded-2xl p-5 animate-card-in ${delay}`}
            style={{
              borderRadius: "16px",
              boxShadow: `0 4px 30px ${outfit.glow}`,
            }}
          >
            <div className="flex items-start justify-between mb-3">
              <div>
                <span
                  className="text-xs font-semibold rounded-full px-2.5 py-1 inline-block mb-2"
                  style={{ background: outfit.tagBg, color: outfit.tagColor }}
                >
                  {outfit.tag}
                </span>
                <h3
                  className="font-display text-xl text-white"
                  style={{ fontWeight: 700 }}
                >
                  {outfit.title}
                </h3>

              }}
            >
              <Icons.ArrowLeft size={15} />
              Volver al inicio
            </button>
          </div>
        );
      };

      /* ══════════════════════════════════════════════════
     HOME SCREEN
  ══════════════════════════════════════════════════ */
      const HomeScreen = ({ onFileSelect, onGoArmario, onGoPremium }) => {
        const cameraRef = useRef(null);
        const galleryRef = useRef(null);

        const handleChange = (e) => {
          const file = e.target.files?.[0];
          if (file) onFileSelect(file);
          e.target.value = "";
        };

        return (
          <div className="flex flex-col items-center px-6 py-4 animate-fade-in">
            {/* Hero icon */}
            <div className="animate-float mb-2 mt-4">
              <div
                className="w-24 h-24 rounded-3xl flex items-center justify-center relative"
                style={{
                  background:
                    "linear-gradient(135deg,rgba(79,142,247,0.15),rgba(168,85,247,0.15))",
                  border: "1px solid rgba(79,142,247,0.25)",
                  boxShadow: "0 0 40px rgba(79,142,247,0.2)",
                }}
              >
                <Icons.Shirt size={44} className="text-blue-300" />
                <div
                  className="absolute -top-2 -right-2 w-7 h-7 rounded-full flex items-center justify-center"
                  style={{
                    background: "linear-gradient(135deg,#a855f7,#e879f9)",
                  }}
                >
                  <Icons.Sparkles size={14} className="text-white" />
                </div>
              </div>
            </div>

            {/* Hero text */}
            <h1
              className="font-display text-3xl text-white text-center leading-tight mb-2 mt-4"
              style={{ fontWeight: 900 }}
            >
              Tu <span className="shimmer-text">stylist AI</span>
              <br />
              personal
            </h1>
            <p className="text-white/45 text-center text-sm leading-relaxed mb-7 max-w-xs">
              Sube la foto de una prenda y descubre
              <br />
              <span className="text-white/65">3 outfits completos</span> para
              combinarla al instante
            </p>

            {/* ── Doble botón de subida ── */}
            <div className="w-full grid grid-cols-2 gap-3 mb-3">
              <button
                onClick={() => cameraRef.current?.click()}
                className="btn-glow-blue rounded-2xl py-4 flex flex-col items-center gap-2 text-white font-semibold text-sm active:scale-95"
              >
                <Icons.Camera size={22} />
                Hacer Foto
              </button>
              <button
                onClick={() => galleryRef.current?.click()}
                className="btn-glow-purple rounded-2xl py-4 flex flex-col items-center gap-2 text-white font-semibold text-sm active:scale-95"
              >
                <Icons.Gallery size={22} />
                Subir de Galería
              </button>
            </div>

            {/* ── Botones secundarios ── */}
            <div className="w-full flex flex-col gap-2.5 mb-8">
              <button
                onClick={onGoArmario}
                className="w-full flex items-center justify-center gap-2 rounded-2xl py-3.5 text-sm font-semibold transition-all active:scale-95"
                style={{
                  background: "rgba(168,85,247,0.07)",
                  border: "1px solid rgba(168,85,247,0.28)",
                  color: "rgba(196,181,253,0.9)",
                }}
              >
                <Icons.Briefcase size={17} />
                Ver mi Armario Virtual
              </button>
              <button
                onClick={onGoPremium}
                className="w-full flex items-center justify-center gap-2 rounded-2xl py-3 text-sm font-semibold transition-all active:scale-95"
                style={{
                  background:
                    "linear-gradient(135deg,rgba(168,85,247,0.1),rgba(232,121,249,0.07))",
                  border: "1px solid rgba(168,85,247,0.38)",
                  color: "rgba(216,180,254,0.85)",
                }}
              >
                <Icons.Crown size={15} className="text-purple-300" />⭐ Ver
                planes Premium
              </button>
            </div>

            {/* Inputs ocultos */}
            <input
              ref={cameraRef}
              type="file"
              accept="image/*"
              capture="environment"
              className="hidden"
              onChange={handleChange}
            />
            <input
              ref={galleryRef}
              type="file"
              accept="image/*"
              className="hidden"
              onChange={handleChange}
            />

            {/* Features row */}
            <div className="w-full grid grid-cols-3 gap-3">
              {[
                { icon: "Camera", label: "Foto en vivo", sub: "o galería" },
                { icon: "Sparkles", label: "Análisis IA", sub: "instantáneo" },
                { icon: "Shirt", label: "3 Outfits", sub: "personalizados" },
              ].map(({ icon, label, sub }) => {
                const IC = Icons[icon];
                return (
                  <div
                    key={label}
                    className="rounded-2xl p-3 text-center"
                    style={{
                      background: "rgba(255,255,255,0.03)",
                      border: "1px solid rgba(255,255,255,0.06)",
                    }}
                  >
                    <IC size={18} className="text-purple-400 mx-auto mb-1.5" />
                    <p className="text-white text-xs font-semibold leading-tight">
                      {label}
                    </p>
                    <p className="text-white/35 text-xs leading-tight">{sub}</p>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      /* ══════════════════════════════════════════════════
     APP
  ══════════════════════════════════════════════════ */
      const App = () => {
        // screens: 'home' | 'loading' | 'results' | 'armario' | 'planes'
        const [screen, setScreen] = useState("home");
        const [imageUrl, setImageUrl] = useState(null);
        const [paywallTrigger, setPaywallTrigger] = useState(false);

        const goToPlanes = useCallback((fromLimit = false) => {
          setPaywallTrigger(fromLimit);
          setScreen("planes");
        }, []);

        const handleFileSelect = useCallback(
          (file) => {
            if (!file) return;

            /* ── Comprobar límite ANTES de procesar ── */
            if (loadArmario().length >= FREE_LIMIT) {
              goToPlanes(true); // → bloqueo con banner
              return;
            }

            const objectUrl = URL.createObjectURL(file);
            setImageUrl(objectUrl);
            setScreen("loading");

            const reader = new FileReader();
            reader.onload = (e) => saveToArmario(e.target.result);
            reader.readAsDataURL(file);

            setTimeout(() => setScreen("results"), 3000);
          },
          [goToPlanes],
        );

        const handleReset = useCallback(() => {
          if (imageUrl) URL.revokeObjectURL(imageUrl);
          setImageUrl(null);
          setScreen("home");
        }, [imageUrl]);

        const showBack = screen !== "home";

        return (
          <div
            className="min-h-screen font-sans"
            style={{ background: "#04040f" }}
          >
            <StarsBackground />
            <div className="mesh-bg" />
            <div
              className="relative z-10 mx-auto flex flex-col min-h-screen"
              style={{ maxWidth: "430px" }}
            >
              <Header
                onBack={handleReset}
                showBack={showBack}
                onGoPremium={() => goToPlanes(false)}
              />

              <main className="flex-1 overflow-y-auto">
                {screen === "home" && (
                  <HomeScreen
                    onFileSelect={handleFileSelect}
                    onGoArmario={() => setScreen("armario")}
                    onGoPremium={() => goToPlanes(false)}
                  />
                )}
                {screen === "loading" && <LoadingScreen imageUrl={imageUrl} />}
                {screen === "results" && (
                  <ResultsScreen imageUrl={imageUrl} onReset={handleReset} />
                )}
                {screen === "armario" && (
                  <ArmarioScreen
                    onBack={handleReset}
                    onGoPremium={() => goToPlanes(false)}
                  />
                )}
                {screen === "planes" && (
                  <PlanesScreen
                    onBack={handleReset}
                    triggeredByLimit={paywallTrigger}
                  />
                )}
              </main>

              <div className="h-6 flex-shrink-0" />
            </div>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
